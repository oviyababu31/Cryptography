<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Euclidean Algorithm - GCD</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #60c39f, #2ebf91);
            font-family: 'Arial', sans-serif;
        }
        .card {
            background: #ffffff;
            width: 480px;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }
        h2 { text-align: center; color: #333; }
        p { text-align: center; color: #666; font-size: 14px; }
        input {
            width: 100%; padding: 10px; margin-top: 12px;
            border-radius: 8px; border: 1px solid #ccc; font-size: 16px;
        }
        button {
            width: 100%; padding: 10px; margin-top: 15px;
            background: #20c997; color: white; font-size: 16px;
            border: none; border-radius: 8px; cursor: pointer;
        }
        button:hover { background: #17a589; }
        pre {
            margin-top: 15px; background: #1e1e2f; color: #eaeaea;
            padding: 15px; border-radius: 8px; max-height: 280px;
            overflow-y: auto; font-size: 14px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Euclidean Algorithm</h2>
    <p>GCD using gcd(a,b) = gcd(b, a mod b)</p>

    <input type="number" id="a" placeholder="Enter first number (a)">
    <input type="number" id="b" placeholder="Enter second number (b)">

    <button onclick="findGCD()">Find GCD</button>

    <pre id="output"></pre>
</div>

<script>
async function findGCD() {
    let a = parseInt(document.getElementById("a").value);
    let b = parseInt(document.getElementById("b").value);
    let out = document.getElementById("output");
    out.textContent = "";

    if (isNaN(a) || isNaN(b) || a <= 0 || b <= 0) {
        out.textContent = "Please enter two positive integers.";
        return;
    }

    // Call the backend GCD endpoint
    try {
        const response = await fetch('http://localhost:3000/calculate-gcd', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ a, b })
        });
        
        const result = await response.json();
        if (response.ok) {
            out.textContent = `GCD = ${result.gcd}\nSteps:\n`;
            result.steps.forEach(step => {
                out.textContent += `gcd(${step.a}, ${step.b}) = ${step.r}\n`;
            });
        } else {
            out.textContent = result.error;
        }
    } catch (error) {
        out.textContent = "Error connecting to the server.";
    }
}
</script>
</body>
</html>
